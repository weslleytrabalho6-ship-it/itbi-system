<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITBI Form System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ITBI Form</h1>
        <form>
            <section>
                <h2>Buyer Data</h2>
                <label for="buyer-name">Name:</label>
                <input type="text" id="buyer-name" name="buyer-name" required>
                <label for="buyer-id">Identity Document:</label>
                <input type="text" id="buyer-id" name="buyer-id" required>
            </section>
            <section>
                <h2>Property Data</h2>
                <label for="property-address">Address:</label>
                <input type="text" id="property-address" name="property-address" required>
                <label for="property-value">Value:</label>
                <input type="number" id="property-value" name="property-value" required>
            </section>
            <section>
                <h2>ITBI Calculation</h2>
                <button type="button" onclick="calculateITBI()">Calculate ITBI</button>
                <p id="itbi-result"></p>
            </section>
            <input type="submit" value="Submit">
        </form>
    </div>
    <script>
        function calculateITBI() {
            const propertyValue = document.getElementById('property-value').value;
            const itbiRate = 0.03; // Example rate
            const itbiValue = propertyValue * itbiRate;
            document.getElementById('itbi-result').innerText = `ITBI: R$ ${itbiValue.toFixed(2)}`;
        }
    </script>
</body>
</html>
